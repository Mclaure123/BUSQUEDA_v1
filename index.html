<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduConnect - Control de Informática</title>
    <style>
        :root {
            --bg: #0f172a; --panel: #1e293b; --accent: #22c55e;
            --text: #f8fafc; --muted: #94a3b8; --border: #334155;
            --info: #3b82f6; --danger: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        #app-container {
            width: 98vw; height: 96vh; background: var(--panel); border-radius: 1.5rem;
            display: grid; grid-template-columns: 380px 1fr; gap: 1.5rem; padding: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        /* BARRA LATERAL */
        .sidebar { display: flex; flex-direction: column; gap: 1rem; border-right: 1px solid var(--border); padding-right: 1.5rem; overflow-y: auto; }
        .header { border-bottom: 2px solid var(--border); padding-bottom: 1rem; }
        .header h1 { font-size: 1.4rem; color: var(--accent); display: flex; align-items: center; gap: 0.5rem; }
        
        .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 1rem; }
        label { font-size: 0.75rem; color: var(--muted); font-weight: bold; text-transform: uppercase; }
        input { background: #0f172a; border: 1px solid var(--border); border-radius: 0.5rem; color: white; padding: 0.7rem; font-size: 0.95rem; outline: none; }
        input:focus { border-color: var(--accent); }

        .motive-list { display: flex; flex-direction: column; gap: 0.6rem; margin-top: 1rem; }
        .motive-card { background: #0f172a; border: 1px solid var(--border); padding: 0.8rem; border-radius: 0.6rem; cursor: pointer; font-size: 0.85rem; transition: 0.2s; display: flex; align-items: center; gap: 0.8rem; }
        .motive-card.active { border-color: var(--accent); background: rgba(34, 197, 94, 0.1); }
        .dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; }
        .active .dot { background: var(--accent); border-color: var(--accent); }

        /* CONTENIDO PRINCIPAL */
        .main { display: grid; grid-template-rows: auto 1fr; gap: 1.5rem; overflow: hidden; }
        
        .preview-box { background: #0f172a; border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        textarea { background: transparent; border: none; color: white; font-size: 1.1rem; resize: none; outline: none; line-height: 1.6; flex-grow: 1; min-height: 120px; }

        .btn-send { 
            background: var(--accent); color: white; border: none; padding: 1.2rem; border-radius: 0.8rem;
            font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 0.8rem;
        }
        .btn-send:hover:not(:disabled) { background: #16a34a; transform: translateY(-2px); }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

        .warning-box { font-size: 0.8rem; color: var(--info); padding: 1rem; border: 1px dashed var(--info); border-radius: 0.8rem; background: rgba(59, 130, 246, 0.05); line-height: 1.4; }

        /* HISTORIAL REGISTRO */
        .history-container { background: #0f172a; border: 1px solid var(--border); border-radius: 1rem; overflow: hidden; display: flex; flex-direction: column; }
        .history-header { padding: 0.8rem 1.2rem; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .history-scroll { overflow-y: auto; flex-grow: 1; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; padding: 0.8rem; color: var(--muted); border-bottom: 1px solid var(--border); }
        td { padding: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.05); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- BARRA LATERAL -->
        <div class="sidebar">
            <div class="header">
                <h1>💻 Reporte Informática</h1>
            </div>

            <div class="form-group">
                <label>Tu Nombre (Docente)</label>
                <input type="text" id="prof-name" placeholder="Ej. Carlos Ortiz" autocomplete="off">
            </div>

            <div class="form-group">
                <label>Estudiante</label>
                <input type="text" id="est-name" placeholder="Nombre alumno">
            </div>

            <div class="form-group">
                <label>Tutor / Padre</label>
                <input type="text" id="tut-name" placeholder="Nombre padre">
            </div>

            <div class="form-group">
                <label>WhatsApp del Padre</label>
                <input type="tel" id="tut-phone" placeholder="Ej. 70012345">
            </div>

            <div class="motive-list" id="motives-grid"></div>
        </div>

        <!-- AREA PRINCIPAL -->
        <div class="main">
            <div class="preview-box">
                <label style="color: var(--accent); font-weight: bold;">VISTA PREVIA DEL MENSAJE SUTIL</label>
                <textarea id="msg-preview" spellcheck="false"></textarea>
                
                <div class="warning-box">
                    <b>MODO UNA SOLA PESTAÑA:</b> Al dar clic, esta página se convertirá en WhatsApp. Una vez enviado el mensaje, presiona el botón <b>ATRÁS (⬅️)</b> de tu navegador para volver aquí. Tus datos no se perderán.
                </div>

                <button id="send-btn" class="btn-send" disabled onclick="executeWorkflow()">
                    🚀 ENVIAR Y ABRIR CHAT
                </button>
            </div>

            <div class="history-container">
                <div class="history-header">
                    <span style="font-weight: bold;">📊 Alumnos Reportados Hoy</span>
                    <button onclick="clearHistory()" style="background: none; border: none; color: var(--danger); cursor: pointer; font-size: 0.7rem;">Borrar Historial</button>
                </div>
                <div class="history-scroll">
                    <table>
                        <thead>
                            <tr>
                                <th>Hora</th>
                                <th>Alumno</th>
                                <th>Motivo</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE MOTIVOS (Sutiles, Identificando Informática y Classroom)
        const MOTIVOS = [
            { id: 1, title: "Classroom: Práctica incompleta", 
              text: "Hola {tutor}, le saluda {docente}, docente de Informática. Quería comentarle que hoy {nombre} no llegó a subir su actividad a Classroom. Le agradecería mucho si pudieran platicar en casa para motivarle a aprovechar el tiempo en la computadora y terminar sus trabajos." },
            { id: 2, title: "Concentración: Charlas en clase", 
              text: "Buenos días {tutor}, le escribe {docente}, docente de Informática. He notado que hoy {nombre} se distrajo charlando con sus compañeros y eso le impidió avanzar con sus ejercicios prácticos. Sería excelente si pudieran platicar en familia sobre la importancia de concentrarse durante la clase." },
            { id: 3, title: "Classroom: No trabaja por charlar", 
              text: "Hola {tutor}, soy {docente}, de Informática. Quería pedirle su valiosa ayuda motivando a {nombre}, ya que hoy por estar charlando no terminó de enviar su tarea a Classroom. Un recordatorio en familia sobre priorizar el trabajo escolar le vendría muy bien para su avance." },
            { id: 4, title: "Respeto a normas de Laboratorio", 
              text: "Saludos {tutor}, le saluda {docente}, docente de Informática. Quería pedirle que conversen con {nombre} sobre el respeto a las normas de convivencia del laboratorio, para que pueda enfocarse mejor en sus aprendizajes tecnológicos junto a sus compañeros." }
        ];

        let state = {
            prof: localStorage.getItem('edu_prof') || '',
            est: localStorage.getItem('edu_est') || '',
            tut: localStorage.getItem('edu_tut') || '',
            phone: localStorage.getItem('edu_phone') || '',
            motiveId: localStorage.getItem('edu_motive') ? parseInt(localStorage.getItem('edu_motive')) : null,
            history: JSON.parse(localStorage.getItem('edu_history')) || []
        };

        window.onload = () => {
            initInputs();
            renderMotives();
            updatePreview();
            renderHistory();
        };

        function initInputs() {
            const map = { 'prof-name': 'prof', 'est-name': 'est', 'tut-name': 'tut', 'tut-phone': 'phone' };
            for(let id in map) {
                const el = document.getElementById(id);
                el.value = state[map[id]];
                el.addEventListener('input', (e) => {
                    let val = e.target.value;
                    if(id === 'tut-phone') val = val.replace(/\D/g, '');
                    state[map[id]] = val;
                    localStorage.setItem('edu_' + map[id], val);
                    updatePreview();
                });
            }
        }

        function renderMotives() {
            const grid = document.getElementById('motives-grid');
            grid.innerHTML = '';
            MOTIVOS.forEach(m => {
                const div = document.createElement('div');
                div.className = `motive-card ${state.motiveId === m.id ? 'active' : ''}`;
                div.innerHTML = `<div class="dot"></div><span>${m.title}</span>`;
                div.onclick = () => {
                    state.motiveId = m.id;
                    localStorage.setItem('edu_motive', m.id);
                    renderMotives();
                    updatePreview();
                };
                grid.appendChild(div);
            });
        }

        function updatePreview() {
            const teacher = state.prof || "[Tu Nombre]";
            const student = state.est || "[Estudiante]";
            const tutor = state.tut || "[Tutor]";
            
            if(!state.motiveId) {
                document.getElementById('msg-preview').value = "Selecciona un motivo...";
                document.getElementById('send-btn').disabled = true;
                return;
            }

            const template = MOTIVOS.find(m => m.id === state.motiveId).text;
            const msg = template
                .replace(/{tutor}/g, tutor)
                .replace(/{docente}/g, teacher)
                .replace(/{nombre}/g, student);
            
            document.getElementById('msg-preview').value = msg;
            document.getElementById('send-btn').disabled = !(state.prof && state.est && state.tut && state.phone);
        }

        function executeWorkflow() {
            const msg = document.getElementById('msg-preview').value;
            const phone = state.phone;
            
            // 1. Guardar en Historial antes de irse
            const entry = {
                time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                name: state.est,
                motive: MOTIVOS.find(m => m.id === state.motiveId).title
            };
            state.history.push(entry);
            localStorage.setItem('edu_history', JSON.stringify(state.history));

            // 2. Limpiar solo los datos del alumno (preparar para el siguiente al volver)
            localStorage.removeItem('edu_est');
            localStorage.removeItem('edu_tut');
            localStorage.removeItem('edu_phone');
            localStorage.removeItem('edu_motive');

            // 3. LA MAGIA: Navegar en la misma pestaña
            const url = `https://web.whatsapp.com/send?phone=${phone}&text=${encodeURIComponent(msg)}`;
            window.location.href = url;
        }

        function renderHistory() {
            const body = document.getElementById('history-body');
            body.innerHTML = '';
            [...state.history].reverse().forEach(h => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${h.time}</td><td>${h.name}</td><td>${h.motive}</td><td style="color:var(--accent)">✓ Registrado</td>`;
                body.appendChild(tr);
            });
        }

        function clearHistory() {
            if(confirm("¿Borrar historial de hoy?")) {
                state.history = [];
                localStorage.setItem('edu_history', JSON.stringify([]));
                renderHistory();
            }
        }
    </script>
</body>
</html>
