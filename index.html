<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Búsqueda | Elite v41.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --neon-blue: #00d4ff; --neon-pink: #ff007f; --neon-green: #39ff14; --neon-gold: #ffcc00;
            --bg-body: #020205; --panel-bg: rgba(5, 5, 15, 0.98);
            --font-display: 'Impact', 'Arial Black', sans-serif;
            --font-tactical: 'Arial Narrow', 'Roboto Condensed', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: manipulation; }
        body { background-color: var(--bg-body); color: #fff; font-family: var(--font-tactical); height: 100vh; width: 100vw; overflow: hidden; display: flex; }
        
        /* SCROLL PERSONALIZADO PARA LA TERMINAL */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .view { display: none; width: 100%; height: 100%; position: absolute; justify-content: center; align-items: center; background: var(--bg-body); }
        .view.active { display: flex; animation: holographicIn 0.5s ease-out forwards; }
        @keyframes holographicIn { 0% { opacity: 0; filter: brightness(3); } 100% { opacity: 1; filter: brightness(1); } }

        /* HUD IZQUIERDO */
        .hud-sidebar { width: 22vw; max-width: 250px; height: 100%; background: var(--panel-bg); border-right: 2px solid var(--neon-blue); display: flex; flex-direction: column; padding: 25px 15px; z-index: 100; position: relative; }
        .hud-content-scroll { flex-grow: 1; overflow-y: auto; scrollbar-width: none; margin-bottom: 80px; }
        .hud-group { margin-bottom: 25px; padding-left: 10px; }
        .hud-label { font-size: 0.65rem; color: #777; display: block; margin-bottom: 4px; letter-spacing: 2px; font-weight: bold; }
        .hud-val { font-size: 1.4rem; color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); font-family: var(--font-display); }
        #target-telemetry { margin-top: 15px; padding-top: 10px; border-top: 1px solid #333; }
        .target-status { display: flex; justify-content: space-between; margin-bottom: 12px; font-family: monospace; font-size: 0.95rem; }
        .target-status.found { color: var(--neon-green); opacity: 0.6; }
        .hud-footer { position: absolute; bottom: 25px; left: 15px; right: 15px; }

        /* JUEGO & GRID ZOOM */
        .game-canvas { width: 78vw; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; padding: 50px 20px; }
        #grid { 
            display: grid; gap: 6px; background: rgba(0, 212, 255, 0.05); padding: 12px; border: 1px solid var(--neon-blue); 
            z-index: 2; transform: scale(0); opacity: 0;
            transition: transform 0.8s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.5s ease;
        }
        #grid.active-level { transform: scale(1); opacity: 1; }

        .board-wrapper { position: relative; padding: 50px; border: 3px solid rgba(0, 212, 255, 0.4); border-radius: 15px; background: rgba(0, 212, 255, 0.02); animation: radarPulse 3s infinite; }
        @keyframes radarPulse { 0%, 100% { border-color: rgba(0, 212, 255, 0.3); } 50% { border-color: rgba(0, 212, 255, 0.8); } }

        .cell { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.2); cursor: pointer; display: flex; justify-content: center; align-items: center; opacity: 0; transform: translateY(20px); transition: all 0.3s; }
        .cell.revealed { opacity: 1; transform: translateY(0); }
        .cell.miss { background: transparent !important; border: 1px solid rgba(255, 0, 127, 0.3); }
        .cell.target { background: var(--neon-green) !important; color: #000; box-shadow: 0 0 30px var(--neon-green); }
        .hint-arrow { color: #fff; font-weight: 900; text-shadow: 0 0 15px var(--neon-pink), 0 0 30px var(--neon-pink); font-size: 2.2rem; -webkit-text-stroke: 1px var(--neon-pink); pointer-events: none; }

        /* CARDINALES */
        .cardinal { position: absolute; font-family: var(--font-display); font-weight: 900; color: rgba(255, 255, 255, 0.1); transition: 0.5s; font-size: 1.1rem; letter-spacing: 3px; }
        .cardinal.active { color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); opacity: 1; }
        .n { top: -40px; left: 50%; transform: translateX(-50%); }
        .s { bottom: -40px; left: 50%; transform: translateX(-50%); }
        .e { right: -90px; top: 50%; transform: translateY(-50%) rotate(90deg); }
        .o { left: -100px; top: 50%; transform: translateY(-50%) rotate(-90deg); }

        /* TERMINAL AGENTES */
        .terminal-box { width: 90%; max-width: 600px; background: var(--panel-bg); padding: 2.5rem; border: 1px solid var(--neon-blue); box-shadow: 0 0 80px rgba(0,212,255,0.1); }
        .agent-list { margin: 15px 0; max-height: 220px; overflow-y: auto; border: 1px solid #333; background: rgba(0,0,0,0.6); }
        .agent-item { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; font-family: var(--font-display); transition: 0.3s; }
        .agent-item.selected { border-left: 8px solid var(--neon-pink); background: rgba(255,0,127,0.15); color: var(--neon-pink); }
        .hof-item { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px dashed #222; color: var(--neon-blue); font-family: var(--font-display); cursor: pointer; transition: 0.2s; }
        .hof-item:hover { background: rgba(0,212,255,0.1); color: #fff; }
        .hof-item.selected { background: rgba(255,0,127,0.15); color: var(--neon-pink); border-left: 5px solid var(--neon-pink); }

        /* BOTONES */
        .btn { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 15px; font-family: var(--font-display); cursor: pointer; text-transform: uppercase; width: 100%; letter-spacing: 3px; font-size: 1rem; transition: 0.3s; }
        .btn:hover:not(:disabled) { background: var(--neon-blue); color: #000; box-shadow: 0 0 30px var(--neon-blue); }
        .btn:disabled { opacity: 0.1; cursor: not-allowed; border-color: #333; }
        .btn.danger { border-color: var(--neon-pink); color: var(--neon-pink); }
        
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; backdrop-filter: blur(15px); }
    </style>
</head>
<body onload="engine.preflight.init()">
    <div id="screen-flash" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:3000; opacity:0; transition:0.15s;"></div>

    <section id="view-welcome" class="view active">
        <div class="terminal-box" style="text-align:center;">
            <h1 style="font-family: var(--font-display); font-size:6rem; margin-bottom:1rem; text-shadow: 0 0 20px var(--neon-blue);">BÚSQUEDA</h1>
            <p id="preflight-status" style="letter-spacing: 8px; color: var(--neon-gold); margin-bottom: 2rem;">ESCANEO DE RED...</p>
            <button id="btn-enter" class="btn" onclick="engine.navigation.enterSystem()" disabled>CARGANDO...</button>
        </div>
    </section>

    <section id="view-mgmt" class="view">
        <div class="terminal-box">
            <h2 style="font-family: var(--font-display); margin-bottom:2rem; text-align:center; letter-spacing: 5px;">TERMINAL AGENTES</h2>
            <div id="mgmt-main-controls">
                <div id="agent-list-ui" class="agent-list"></div>
                <div style="display:flex; gap:15px;">
                    <button class="btn" onclick="engine.ui.toggleAddMode(true)">+ AGENTE</button>
                    <button class="btn" id="btn-bind" onclick="engine.session.select()" disabled>VINCULAR</button>
                    <button class="btn danger" id="btn-purge" onclick="engine.session.purge()" disabled>BORRAR</button>
                </div>
                <div style="margin-top:25px; font-family:var(--font-display); font-size:0.9rem; color:#555; letter-spacing: 3px;">TOP 20 OPERATIVOS (SELECCIONAR)</div>
                <div id="hof-list-ui" class="agent-list" style="max-height:160px; border-color: var(--neon-pink);"></div>
            </div>
            <div id="add-agent-ui" style="display:none; border-top:1px solid #333; padding-top:20px;">
                <div id="agent-input-display" style="color:var(--neon-green); text-align:center; font-size:3rem; font-family: var(--font-display); margin-bottom:20px;">_</div>
                <div id="virtual-keyboard" style="display:grid; grid-template-columns:repeat(10,1fr); gap:8px;"></div>
                <button class="btn" style="margin-top:30px;" onclick="engine.session.create()">AUTORIZAR</button>
            </div>
        </div>
    </section>

    <section id="view-game" class="view">
        <aside class="hud-sidebar">
            <div class="hud-content-scroll">
                <div class="hud-group"><span class="hud-label">OPERATIVO</span><span id="hud-user" class="hud-val">---</span></div>
                <div class="hud-group"><span class="hud-label">MISIÓN</span><span id="hud-lv" class="hud-val">01</span></div>
                <div class="hud-group"><span class="hud-label">RÉCORD</span><span id="hud-score" class="hud-val">0000</span></div>
                <div class="hud-label" style="border-top:1px solid #333; margin-top:40px; padding-top:20px;">TELEMETRÍA</div>
                <div id="target-telemetry"></div>
            </div>
            <div class="hud-footer"><button class="btn danger" onclick="engine.navigation.show('view-mgmt')">SALIR</button></div>
        </aside>
        <main class="game-canvas">
            <div class="board-wrapper">
                <div id="c-n" class="cardinal n">NORTE</div><div id="c-s" class="cardinal s">SUR</div><div id="c-e" class="cardinal e">ESTE</div><div id="c-o" class="cardinal o">OESTE</div>
                <div id="grid"></div>
            </div>
        </main>
    </section>

    <div id="modal-nextlevel" class="modal-overlay">
        <h1 style="font-family:var(--font-display); font-size:6rem; color:var(--neon-green); text-shadow: 0 0 50px var(--neon-green);">MISIÓN CUMPLIDA</h1>
        <div id="stats-summary" style="margin:30px 0; color:var(--neon-blue); font-size: 1.5rem; font-family:monospace;"></div>
        <button class="btn" style="max-width:400px; border-color:var(--neon-green); color:var(--neon-green);" onclick="engine.ui.closeVictory()">SIGUIENTE FASE</button>
    </div>

    <script>
        const SB_URL = 'https://iwuglirgkvnobhatgedq.supabase.co';
        const SB_KEY = 'sb_publishable_sNgWni9L5DWroTgEPKhKQw_cST-OXxR';
        
        const engine = {
            state: { agents: [], selectedAgent: null, tempName: '', level: 1, score: 0, tries: 0, targets: [], foundCount: 0, lastR: -1, lastC: -1, audioCtx: null },
            
            audio: {
                init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
                play(f, t, d, v=0.1) { this.init(); const o = this.ctx.createOscillator(), g = this.ctx.createGain(); o.type = t; o.frequency.setValueAtTime(f, this.ctx.currentTime); g.gain.setValueAtTime(v, this.ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d); o.connect(g); g.connect(this.ctx.destination); o.start(); o.stop(this.ctx.currentTime + d); },
                beep() { this.play(880, 'sine', 0.2); },
                error() { this.play(110, 'sawtooth', 0.3, 0.15); },
                win() { this.play(440, 'square', 0.5); setTimeout(()=>this.play(660, 'square', 0.5), 150); }
            },

            preflight: {
                async init() {
                    const status = document.getElementById('preflight-status');
                    const btn = document.getElementById('btn-enter');
                    if(navigator.onLine) {
                        status.textContent = "CONECTANDO A NUBE...";
                        await engine.cloud.init();
                        const cloudData = await engine.cloud.getTop();
                        if(cloudData) {
                            engine.state.agents = cloudData.map(d => ({ name: d.agent_name, level: d.max_level, highScore: d.high_score }));
                            status.textContent = "TOP 20 SINCRONIZADO";
                        }
                    } else {
                        status.textContent = "MODO OFFLINE ACTIVO";
                    }
                    try {
                        const local = JSON.parse(localStorage.getItem('AGENTS_DB_V41'));
                        if(Array.isArray(local)) local.forEach(l => { if(!engine.state.agents.some(a => a.name === l.name)) engine.state.agents.push(l); });
                    } catch(e) { localStorage.removeItem('AGENTS_DB_V41'); }
                    setTimeout(() => { btn.disabled = false; btn.textContent = "ACCEDER AL SISTEMA"; status.style.color = "var(--neon-green)"; }, 800);
                }
            },

            cloud: {
                client: null,
                async init() { if(!this.client && typeof supabase !== 'undefined') this.client = supabase.createClient(SB_URL, SB_KEY); },
                async save(a) { await this.init(); if(this.client) try { await this.client.from('hall_of_fame').upsert({ agent_name: a.name, high_score: a.highScore, max_level: a.level }, { onConflict: 'agent_name' }); } catch(e){} },
                async getTop() { await this.init(); if(this.client) { try { const {data} = await this.client.from('hall_of_fame').select('*').order('high_score', {ascending:false}).limit(20); return data; } catch(e){return null;} } return null; }
            },

            navigation: { 
                enterSystem() { engine.audio.init(); engine.audio.beep(); this.show('view-mgmt'); },
                show(viewId) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(viewId).classList.add('active'); if(viewId === 'view-mgmt') { engine.state.isLive = false; engine.ui.renderAgents(); engine.ui.renderHOF(); } } 
            },

            session: {
                create() { if(engine.state.tempName.length > 1) { engine.audio.beep(); engine.state.agents.push({ name: engine.state.tempName.toUpperCase(), level: 1, highScore: 0 }); this.sync(); engine.state.tempName = ''; engine.ui.toggleAddMode(false); engine.ui.renderAgents(); engine.ui.renderHOF(); } },
                select() { if(engine.state.selectedAgent !== null) { engine.audio.beep(); const a = engine.state.agents[engine.state.selectedAgent]; engine.state.user = a.name; engine.state.level = a.level; engine.logic.initLevel(); engine.navigation.show('view-game'); } },
                purge() { if(engine.state.selectedAgent !== null) { engine.audio.error(); engine.state.agents.splice(engine.state.selectedAgent, 1); this.sync(); engine.state.selectedAgent = null; engine.ui.renderAgents(); engine.ui.renderHOF(); engine.ui.toggleControls(false); } },
                sync() { localStorage.setItem('AGENTS_DB_V41', JSON.stringify(engine.state.agents)); }
            },

            logic: {
                initLevel() {
                    const grid = document.getElementById('grid'); grid.classList.remove('active-level'); grid.innerHTML = '';
                    const size = 5 + Math.floor(engine.state.level / 4);
                    const targetCount = Math.min(5, Math.ceil(engine.state.level / 4));
                    engine.state.tries = 0; engine.state.score = 5000; engine.state.targets = []; engine.state.foundCount = 0; engine.state.lastR = -1; engine.state.lastC = -1;
                    while(engine.state.targets.length < targetCount) { const t = { id: `T-0${engine.state.targets.length+1}`, r: Math.floor(Math.random()*size), c: Math.floor(Math.random()*size), found: false }; if(!engine.state.targets.some(e => e.r === t.r && e.c === t.c)) engine.state.targets.push(t); }
                    grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
                    const cellSize = Math.floor(Math.min(window.innerHeight * 0.55, window.innerWidth * 0.55) / size);
                    for(let r=0; r<size; r++) { for(let c=0; c<size; c++) { const cell = document.createElement('div'); cell.className = 'cell'; cell.style.width = cell.style.height = `${cellSize}px`; cell.onclick = () => engine.logic.press(r, c, cell, size); grid.appendChild(cell); setTimeout(() => cell.classList.add('revealed'), (r * size + c) * 12); } }
                    setTimeout(() => { grid.classList.add('active-level'); engine.audio.play(220, 'sine', 0.5, 0.05); }, 50);
                    engine.ui.updateHUD(); engine.ui.clearCardinals();
                },
                press(r, c, cell, size) {
                    if(cell.classList.contains('miss') || cell.classList.contains('target')) return;
                    engine.state.tries++; engine.state.lastR = r; engine.state.lastC = c;
                    const hit = engine.state.targets.find(t => t.r === r && t.c === c);
                    if(hit) {
                        engine.audio.beep(); cell.classList.add('target'); cell.innerHTML = `<span style="font-size:0.7rem;font-weight:900;">🎯${hit.id}</span>`;
                        hit.found = true; engine.state.foundCount++; engine.state.score += 500;
                        if(engine.state.foundCount === engine.state.targets.length) { engine.audio.win(); setTimeout(() => { document.getElementById('grid').classList.remove('active-level'); engine.ui.showVictory(); }, 500); }
                    } else {
                        engine.audio.error(); cell.classList.add('miss'); engine.state.score -= 50;
                        const near = engine.state.targets.filter(t => !t.found).reduce((p, curr) => (Math.abs(r-curr.r)+Math.abs(c-curr.c)) < (Math.abs(r-p.r)+Math.abs(c-p.c)) ? curr : p);
                        cell.innerHTML = `<span class="hint-arrow">${this.getArrow(r,c,near)}</span>`; this.updateCardinals(r, c);
                    }
                    engine.ui.updateHUD();
                },
                getArrow(r, c, t) { if(t.r < r && t.c === c) return '↑'; if(t.r > r && t.c === c) return '↓'; if(t.r === r && t.c < c) return '←'; if(t.r === r && t.c > c) return '→'; if(t.r < r && t.c < c) return '↖'; if(t.r < r && t.c > c) return '↗'; if(t.r > r && t.c < c) return '↙'; return '↘'; },
                updateCardinals(r, c) { engine.ui.clearCardinals(); engine.state.targets.filter(t => !t.found).forEach(t => { if (t.r < r) document.getElementById('c-n').classList.add('active'); if (t.r > r) document.getElementById('c-s').classList.add('active'); if (t.c > c) document.getElementById('c-e').classList.add('active'); if (t.c < c) document.getElementById('c-o').classList.add('active'); }); }
            },

            ui: {
                showVictory() { document.getElementById('stats-summary').innerHTML = `PUNTOS: ${engine.state.score} | INTENTOS: ${engine.state.tries}`; document.getElementById('modal-nextlevel').style.display = 'flex'; },
                async closeVictory() {
                    document.getElementById('modal-nextlevel').style.display = 'none';
                    const ag = engine.state.agents[engine.state.selectedAgent]; ag.level++; engine.state.level++;
                    if(engine.state.score > ag.highScore) ag.highScore = engine.state.score; engine.session.sync();
                    await engine.cloud.save(ag); engine.logic.initLevel();
                },
                toggleControls(a) { document.getElementById('btn-bind').disabled = !a; document.getElementById('btn-purge').disabled = !a; },
                selectAgentByName(name) { const idx = engine.state.agents.findIndex(a => a.name === name); if(idx !== -1) { engine.state.selectedAgent = idx; this.renderAgents(); this.renderHOF(); this.toggleControls(true); } },
                renderAgents() { document.getElementById('agent-list-ui').innerHTML = engine.state.agents.map((a, i) => `<div class="agent-item ${engine.state.selectedAgent === i ? 'selected' : ''}" onclick="engine.ui.selectAgentByName('${a.name}')"><span>${a.name}</span><span>LV ${a.level}</span></div>`).join(''); },
                async renderHOF() { 
                    const list = document.getElementById('hof-list-ui'); let data = await engine.cloud.getTop(); if(!data) data = [...engine.state.agents].sort((a,b) => b.highScore - a.highScore).slice(0, 5); 
                    list.innerHTML = data.map(a => { const n = a.agent_name || a.name; const s = engine.state.selectedAgent !== null && engine.state.agents[engine.state.selectedAgent].name === n; return `<div class="hof-item ${s?'selected':''}" onclick="engine.ui.selectAgentByName('${n}')"><span>${n}</span><span>${a.high_score || a.highScore}</span></div>` }).join(''); 
                },
                toggleAddMode(s) { document.getElementById('add-agent-ui').style.display = s ? 'block' : 'none'; document.getElementById('mgmt-main-controls').style.display = s ? 'none' : 'block'; if(s) document.getElementById('virtual-keyboard').innerHTML = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789".split("").map(k => `<div style="padding:10px; background:#111; border:1px solid #333; color:var(--neon-blue); cursor:pointer; text-align:center;" onclick="engine.state.tempName+='${k}'; engine.audio.beep(); engine.ui.updateKB();">${k}</div>`).join(''); },
                updateKB() { document.getElementById('agent-input-display').textContent = engine.state.tempName || '_'; },
                updateHUD() {
                    const pad = (v) => v.toString().padStart(2,'0'); document.getElementById('hud-user').textContent = engine.state.user || '---'; document.getElementById('hud-lv').textContent = pad(engine.state.level);
                    document.getElementById('hud-score').textContent = engine.state.score.toString().padStart(4,'0');
                    document.getElementById('target-telemetry').innerHTML = engine.state.targets.map(t => { const a = (engine.state.lastR !== -1 && !t.found) ? engine.logic.getArrow(engine.state.lastR, engine.state.lastC, t) : '---'; return `<div class="target-status ${t.found?'found':''}"><span>${t.id}</span><span>${t.found?'CAPTURED':a}</span></div>` }).join('');
                },
                clearCardinals() { document.querySelectorAll('.cardinal').forEach(el => el.classList.remove('active')); }
            }
        };
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
