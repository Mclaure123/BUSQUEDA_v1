<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EduConnect - Gestor de Informática V6.1</title>
<style>
:root {
--bg-main: #0f172a;
--panel-bg: #1e293b;
--accent: #22c55e;
--accent-hover: #16a34a;
--text-main: #f8fafc;
--text-muted: #94a3b8;
--border: #334155;
--input-bg: #0f172a;
--warning: #fbbf24;
--info: #3b82f6;
--danger: #ef4444;
}
* {
box-sizing: border-box;
margin: 0;
padding: 0;
user-select: none;
-webkit-tap-highlight-color: transparent;
}
html, body {
width: 100vw;
height: 100vh;
overflow: hidden;
background-color: var(--bg-main);
color: var(--text-main);
font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
display: flex;
justify-content: center;
align-items: center;
}
#monolith-app {
width: 98vw;
height: 98vh;
background-color: var(--panel-bg);
border-radius: 1.5vh;
display: grid;
grid-template-columns: 1fr 1fr;
grid-template-rows: 10vh 1fr 6vh;
gap: 1.5vh;
padding: 2vh;
border: 0.1vh solid var(--border);
position: relative;
}
header {
grid-column: 1 / -1;
display: flex;
justify-content: space-between;
align-items: center;
border-bottom: 0.2vh solid var(--border);
padding-bottom: 1vh;
}
.brand {
display: flex;
align-items: center;
gap: 1vw;
color: var(--accent);
font-size: 3.2vh;
font-weight: 800;
}
#system-clock {
text-align: right;
font-family: monospace;
font-size: 1.8vh;
color: var(--text-muted);
}
.panel {
display: flex;
flex-direction: column;
gap: 1.2vh;
height: 100%;
overflow: hidden;
}
.scroll-area {
flex-grow: 1;
overflow-y: auto;
padding-right: 0.5vw;
}
.scroll-area::-webkit-scrollbar {
width: 0.6vw;
}
.scroll-area::-webkit-scrollbar-track {
background: var(--input-bg);
}
.scroll-area::-webkit-scrollbar-thumb {
background: var(--border);
border-radius: 1vh;
}
.form-group {
display: flex;
flex-direction: column;
gap: 0.5vh;
margin-bottom: 1vh;
}
label {
font-size: 1.7vh;
font-weight: 600;
color: var(--text-muted);
text-transform: uppercase;
}
input {
background: var(--input-bg);
border: 0.2vh solid var(--border);
border-radius: 0.8vh;
color: var(--text-main);
padding: 1.2vh 1vw;
font-size: 1.9vh;
outline: none;
transition: border-color 0.3s;
}
input:focus {
border-color: var(--accent);
}
.options-grid {
display: grid;
grid-template-columns: 1fr;
gap: 1vh;
}
.option-card {
background: var(--input-bg);
border: 0.2vh solid var(--border);
border-radius: 0.8vh;
padding: 1.5vh;
cursor: pointer;
display: flex;
align-items: center;
gap: 1vw;
transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}
.option-card:hover {
border-color: var(--text-muted);
transform: translateX(0.5vw);
}
.option-card.active {
border-color: var(--accent);
background: rgba(34, 197, 94, 0.05);
}
.radio-dot {
width: 1.8vh;
height: 1.8vh;
border-radius: 50%;
border: 0.2vh solid var(--text-muted);
display: flex;
align-items: center;
justify-content: center;
}
.option-card.active .radio-dot {
border-color: var(--accent);
background: var(--accent);
box-shadow: 0 0 1vh var(--accent);
}
#preview-container {
background: var(--input-bg);
border-radius: 1vh;
border: 0.2vh solid var(--border);
padding: 2vh;
display: flex;
flex-direction: column;
gap: 1.5vh;
}
#message-editor {
flex-grow: 1;
background: transparent;
border: none;
color: var(--text-main);
font-size: 2.1vh;
line-height: 1.6;
resize: none;
outline: none;
font-family: inherit;
}
.status-bar {
grid-column: 1 / -1;
display: flex;
align-items: center;
justify-content: space-between;
font-size: 1.5vh;
color: var(--text-muted);
border-top: 0.1vh solid var(--border);
padding-top: 0.5vh;
}
.btn {
padding: 1.8vh;
border: none;
border-radius: 0.8vh;
font-weight: 700;
font-size: 2vh;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
gap: 1vw;
transition: all 0.2s;
text-transform: uppercase;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover:not(:disabled) { background: var(--accent-hover); box-shadow: 0 0 2vh rgba(34, 197, 94, 0.3); }
.btn-secondary { background: var(--info); color: white; }
.btn-outline { background: transparent; border: 0.2vh solid var(--border); color: var(--text-main); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
.validation-badge {
padding: 0.5vh 1vw;
border-radius: 2vh;
font-size: 1.4vh;
font-weight: 800;
}
.v-pending { background: rgba(251, 191, 36, 0.1); color: var(--warning); }
.v-ok { background: rgba(34, 197, 94, 0.1); color: var(--accent); }
@media (orientation: portrait) {
#monolith-app { grid-template-columns: 1fr; grid-template-rows: 8vh 40vh 1fr 4vh; }
}
</style>
</head>
<body>
<div id="monolith-app">
<header>
<div class="brand">
<svg width="4vh" height="4vh" viewBox="0 0 24 24" fill="currentColor"><path d="M20,18c1.1,0,2-0.9,2-2V6c0-1.1-0.9-2-2-2H4C2.9,4,2,4.9,2,6v10c0,1.1,0.9,2,2,2H0v2h24v-2H20z M4,6h16v10H4V6z"/></svg>
EDUCONNECT V6.1
</div>
<div id="system-clock">CARGANDO NÚCLEO...</div>
</header>
<div class="panel">
<div class="form-group">
<label>Docente (Persistente)</label>
<input type="text" id="teacher-in" placeholder="Nombre del docente" autocomplete="off">
</div>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1vw;">
<div class="form-group"><label>Estudiante</label><input type="text" id="student-in" placeholder="Nombre" autocomplete="off"></div>
<div class="form-group"><label>Tutor</label><input type="text" id="tutor-in" placeholder="Nombre tutor" autocomplete="off"></div>
</div>
<div class="form-group">
<label>Teléfono Destino</label>
<input type="tel" id="phone-in" placeholder="70000000" maxlength="12">
</div>
<label>Motivo del reporte</label>
<div class="scroll-area">
<div id="options-mount" class="options-grid"></div>
</div>
</div>
<div class="panel" id="preview-container">
<label style="color: var(--accent)">Vista Previa - Canal de Salida Único</label>
<textarea id="message-editor" spellcheck="false"></textarea>
<div id="v-status" class="validation-badge v-pending">ESPERANDO DATOS...</div>
<button id="send-main" class="btn btn-primary" disabled>
<svg width="2.5vh" height="2.5vh" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
Enviar a WhatsApp (Ventana Única)
</button>
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1vw;">
<button id="btn-copy" class="btn btn-outline" disabled>Copiar</button>
<button id="btn-refresh" class="btn btn-outline">Otro Mensaje</button>
</div>
</div>
<footer class="status-bar">
<span>MODO PARANOIA: ACTIVO</span>
<span id="char-count">0 Chars</span>
<span>BUILD: 2026.04.V6</span>
</footer>
</div>
<script>
const Config = {
WA_TARGET: "WA_GATEWAY_SESSION",
STORAGE_KEY: "EDUCONNECT_V6_DATA",
OPTIONS: [
{ id: "o1", t: "No subió práctica a Classroom" },
{ id: "o2", t: "Charla excesiva / No trabaja en PC" },
{ id: "o3", t: "Indisciplina en Laboratorio" },
{ id: "o4", t: "Faltas / Atrasos frecuentes" },
{ id: "o5", t: "Uso indebido de Internet" },
{ id: "o6", t: "Reporte Personalizado" }
]
};
const Templates = {
"o1": ["{saludo} {tutor}. Soy {docente}, de Informática. Le informo que {nombre} no subió la práctica hoy.", "{saludo} {tutor}. Reporte de {docente}: {nombre} no cumplió con la entrega digital en clase."],
"o2": ["{saludo} {tutor}. Le escribe {docente}. {nombre} ha estado charlando mucho y no avanzó en su computadora.", "{saludo} {tutor}. {nombre} no terminó su trabajo hoy por distracciones constantes en el aula."],
"o3": ["{saludo} {tutor}. Soy {docente}. Le informo que {nombre} mostró mala conducta en el laboratorio hoy.", "{saludo} {tutor}. Reporte disciplinario de {nombre}: no respetó las normas de la clase de informática."],
"o4": ["{saludo} {tutor}. {nombre} presenta inasistencias que afectan su promedio práctico.", "{saludo} {tutor}. Le informo que {nombre} llegó tarde y perdió tiempo valioso de práctica en PC."],
"o5": ["{saludo} {tutor}. {nombre} fue sorprendido usando internet para fines ajenos a la clase.", "{saludo} {tutor}. Le informo que {nombre} no sigue instrucciones sobre el uso responsable de la red."],
"o6": ["{saludo} {tutor}. Soy {docente}. Reporte sobre {nombre}:\n[ESCRIBA AQUÍ]"]
};
const StateManager = {
data: { teacher: "", student: "", tutor: "", phone: "", optionId: null, template: "", message: "" },
init() {
const saved = localStorage.getItem(Config.STORAGE_KEY);
if (saved) {
const p = JSON.parse(saved);
this.data.teacher = p.teacher || "";
document.getElementById('teacher-in').value = this.data.teacher;
}
this.updateValidation();
},
save() {
localStorage.setItem(Config.STORAGE_KEY, JSON.stringify({ teacher: this.data.teacher }));
},
set(key, val) {
this.data[key] = val;
if(key === 'teacher') this.save();
this.generate();
this.updateValidation();
},
generate(forceNew = false) {
if (!this.data.optionId) return;
if (forceNew || !this.data.template) {
const pool = Templates[this.data.optionId];
this.data.template = pool[Math.floor(Math.random() * pool.length)];
}
const now = new Date();
const hour = now.getHours();
const saludo = hour < 12 ? "Buen día" : hour < 19 ? "Buenas tardes" : "Buenas noches";
let m = this.data.template
.replace(/{saludo}/g, saludo)
.replace(/{tutor}/g, this.data.tutor || "[Tutor]")
.replace(/{docente}/g, this.data.teacher || "[Docente]")
.replace(/{nombre}/g, this.data.student || "[Estudiante]");
this.data.message = m;
document.getElementById('message-editor').value = m;
},
updateValidation() {
const d = this.data;
const isValid = d.teacher && d.student && d.tutor && d.phone.length >= 8 && d.optionId;
const btn = document.getElementById('send-main');
const badge = document.getElementById('v-status');
btn.disabled = !isValid;
document.getElementById('btn-copy').disabled = !d.message;
if(isValid) {
badge.className = "validation-badge v-ok";
badge.innerText = "SISTEMA LISTO PARA EMISIÓN";
} else {
badge.className = "validation-badge v-pending";
badge.innerText = "PENDIENTE: " + (!d.teacher ? "DOCENTE " : !d.student ? "ALUMNO " : !d.phone ? "TELÉFONO " : "MOTIVO");
}
document.getElementById('char-count').innerText = `${d.message.length} Chars`;
}
};
const CommunicationEngine = {
send() {
const d = StateManager.data;
const encoded = encodeURIComponent(d.message);
const url = `https://web.whatsapp.com/send?phone=${d.phone}&text=${encoded}`;
window.open(url, Config.WA_TARGET);
}
};
const UIManager = {
init() {
const mount = document.getElementById('options-mount');
Config.OPTIONS.forEach(opt => {
const card = document.createElement('div');
card.className = 'option-card';
card.innerHTML = `<div class="radio-dot"></div><span>${opt.t}</span>`;
card.onclick = () => {
document.querySelectorAll('.option-card').forEach(c => c.classList.remove('active'));
card.classList.add('active');
StateManager.set('optionId', opt.id);
};
mount.appendChild(card);
});
document.getElementById('teacher-in').oninput = (e) => StateManager.set('teacher', e.target.value);
document.getElementById('student-in').oninput = (e) => StateManager.set('student', e.target.value);
document.getElementById('tutor-in').oninput = (e) => StateManager.set('tutor', e.target.value);
document.getElementById('phone-in').oninput = (e) => StateManager.set('phone', e.target.value.replace(/\D/g,''));
document.getElementById('message-editor').oninput = (e) => StateManager.set('message', e.target.value);
document.getElementById('send-main').onclick = () => CommunicationEngine.send();
document.getElementById('btn-refresh').onclick = () => StateManager.generate(true);
document.getElementById('btn-copy').onclick = () => {
navigator.clipboard.writeText(StateManager.data.message);
const b = document.getElementById('btn-copy');
b.innerText = "¡COPIADO!";
setTimeout(() => b.innerText = "COPIAR", 1000);
};
setInterval(() => {
const n = new Date();
document.getElementById('system-clock').innerText = n.toLocaleString('es-ES', {hour12:false});
}, 1000);
}
};
document.addEventListener('DOMContentLoaded', () => {
StateManager.init();
UIManager.init();
});
</script>
</body>
</html>
