<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>EduConnect Mobile-Resilient V6.1.5</title>
<style>
:root {
--bg: #0f172a; --panel: #1e293b; --accent: #22c55e; --accent-hv: #16a34a;
--text: #f8fafc; --muted: #94a3b8; --border: #334155; --input: #0f172a;
--warn: #fbbf24; --info: #3b82f6; --safe-area-bottom: env(safe-area-inset-bottom);
}
* { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
html, body { 
width: 100vw; height: 100vh; overflow: hidden; 
background-color: var(--bg); color: var(--text);
font-family: system-ui, -apple-system, sans-serif;
}
#app-monolith {
width: 100vw; height: 100vh; display: flex; flex-direction: column;
padding: env(safe-area-inset-top) 2vw var(--safe-area-bottom) 2vw;
background-color: var(--bg);
}
header {
height: 8vh; display: flex; align-items: center; justify-content: space-between;
border-bottom: 0.1vh solid var(--border); padding: 0 2vw;
}
.title { color: var(--accent); font-weight: 800; font-size: 2.8vh; display: flex; align-items: center; gap: 2vw; }
.main-content {
flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 2vw;
padding: 1.5vh 0; overflow: hidden;
}
@media (max-width: 768px) {
.main-content { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
.title { font-size: 2.2vh; }
}
.panel {
background: var(--panel); border-radius: 1.5vh; border: 0.1vh solid var(--border);
display: flex; flex-direction: column; overflow: hidden; padding: 1.5vh;
}
.scroll-zone { flex: 1; overflow-y: auto; padding-right: 1vw; }
.form-group { margin-bottom: 1.2vh; display: flex; flex-direction: column; gap: 0.5vh; }
label { font-size: 1.4vh; color: var(--muted); font-weight: 700; text-transform: uppercase; }
input, textarea {
width: 100%; background: var(--input); border: 0.2vh solid var(--border);
border-radius: 1vh; color: var(--text); font-size: 1.8vh; padding: 1.2vh; outline: none;
}
input:focus { border-color: var(--accent); }
.opt-list { display: flex; flex-direction: column; gap: 1vh; }
.opt-item {
background: var(--input); border: 0.2vh solid var(--border); border-radius: 1vh;
padding: 1.2vh; cursor: pointer; display: flex; align-items: center; gap: 3vw;
transition: 0.2s;
}
.opt-item.active { border-color: var(--accent); background: rgba(34, 197, 94, 0.1); }
.dot { width: 2vh; height: 2vh; border-radius: 50%; border: 0.2vh solid var(--muted); flex-shrink: 0; }
.opt-item.active .dot { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 1vh var(--accent); }
#preview-box { flex: 1; display: flex; flex-direction: column; gap: 1vh; }
#editor { flex: 1; background: transparent; border: none; color: var(--text); font-size: 2vh; resize: none; outline: none; line-height: 1.4; }
.btn-send {
height: 8vh; background: var(--accent); color: white; border: none; border-radius: 1.2vh;
font-size: 2.2vh; font-weight: 800; cursor: pointer; display: flex; align-items: center;
justify-content: center; gap: 2vw; transition: 0.2s;
}
.btn-send:disabled { opacity: 0.3; filter: grayscale(1); }
.validator { font-size: 1.4vh; text-align: center; font-weight: bold; padding: 0.5vh; border-radius: 0.5vh; }
.v-off { color: var(--warn); background: rgba(251, 191, 36, 0.1); }
.v-on { color: var(--accent); background: rgba(34, 197, 94, 0.1); }
footer { height: 4vh; display: flex; justify-content: space-between; align-items: center; font-size: 1.2vh; color: var(--muted); opacity: 0.6; }
</style>
</head>
<body>
<div id="app-monolith">
<header>
<div class="title">🟢 EduConnect Mobile V6</div>
<div id="clock" style="font-family:monospace; font-size: 1.6vh;">00:00</div>
</header>
<main class="main-content">
<section class="panel">
<div class="scroll-zone">
<div class="form-group"><label>Docente</label><input type="text" id="t-in" placeholder="Su nombre"></div>
<div class="form-group"><label>Estudiante</label><input type="text" id="s-in" placeholder="Nombre alumno"></div>
<div class="form-group"><label>Tutor</label><input type="text" id="p-in" placeholder="Padre/Madre"></div>
<div class="form-group"><label>Celular Tutor</label><input type="tel" id="c-in" placeholder="70000000" maxlength="12"></div>
<label>Motivo</label>
<div id="opt-mount" class="opt-list"></div>
</div>
</section>
<section class="panel" id="preview-box">
<label style="color:var(--accent)">Reporte Final</label>
<textarea id="editor" spellcheck="false"></textarea>
<div id="v-stat" class="validator v-off">FALTAN DATOS</div>
<button id="send-btn" class="btn-send" disabled>🚀 ENVIAR A WHATSAPP</button>
<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 2vw;">
<button id="copy-btn" style="padding: 1.5vh; background: var(--border); color: white; border:none; border-radius:1vh;">📋 COPIAR</button>
<button id="pc-btn" style="padding: 1.5vh; background: var(--border); color: white; border:none; border-radius:1vh;">💻 MODO PC</button>
</div>
</section>
</main>
<footer>
<span>ENGINE: V6.1.5-HYBRID</span>
<span id="device-info">DETECTANDO...</span>
</footer>
</div>
<script>
const Core = {
options: [
{id: "m1", t: "No subió práctica a Classroom"},
{id: "m2", t: "Charla y no trabaja en PC"},
{id: "m3", t: "Indisciplina Laboratorio"},
{id: "m4", t: "Faltas / Atrasos"},
{id: "m5", t: "Reporte Libre"}
],
templates: {
"m1": ["{saludo} {tutor}. Soy {docente}. {nombre} no subió su práctica a Classroom hoy.", "{saludo} {tutor}. Le informo que {nombre} tiene pendiente el envío digital de hoy."],
"m2": ["{saludo} {tutor}. {nombre} se distrajo charlando y no avanzó en la computadora.", "{saludo} {tutor}. Soy {docente}. {nombre} no terminó el trabajo por platicar en clase."],
"m3": ["{saludo} {tutor}. Le informo una falta de disciplina de {nombre} en el laboratorio.", "{saludo} {tutor}. {nombre} no siguió las normas de conducta hoy."],
"m4": ["{saludo} {tutor}. Las faltas/atrasos de {nombre} están afectando su nota.", "{saludo} {tutor}. Registro una demora de {nombre} que impidió su práctica."],
"m5": ["{saludo} {tutor}. Soy {docente}. Reporte de {nombre}:\n\n[Escriba aquí]"]
}
};
const State = {
db: { teacher: "", student: "", tutor: "", phone: "", opt: null, msg: "", isMobile: false },
init() {
this.db.teacher = localStorage.getItem('teacher_cache') || "";
document.getElementById('t-in').value = this.db.teacher;
this.db.isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
document.getElementById('device-info').innerText = this.db.isMobile ? "DISPOSITIVO: MÓVIL" : "DISPOSITIVO: PC";
this.renderOpts();
this.bind();
},
renderOpts() {
const mount = document.getElementById('opt-mount');
Core.options.forEach(o => {
const div = document.createElement('div'); div.className = 'opt-item'; div.dataset.id = o.id;
div.innerHTML = `<div class="dot"></div><span style="font-size:1.6vh">${o.t}</span>`;
div.onclick = () => this.update('opt', o.id);
mount.appendChild(div);
});
},
update(key, val) {
this.db[key] = val;
if(key === 'teacher') localStorage.setItem('teacher_cache', val);
if(key === 'opt') {
const p = Core.templates[val];
this.db.raw = p[Math.floor(Math.random()*p.length)];
}
this.process();
},
process() {
if(!this.db.opt) return;
const h = new Date().getHours();
const s = h < 12 ? "Buenos días" : h < 19 ? "Buenas tardes" : "Buenas noches";
this.db.msg = this.db.raw.replace(/{saludo}/g, s).replace(/{docente}/g, this.db.teacher || "[Docente]")
.replace(/{tutor}/g, this.db.tutor || "[Tutor]").replace(/{nombre}/g, this.db.student || "[Estudiante]");
this.sync();
},
sync() {
const editor = document.getElementById('editor');
if(document.activeElement !== editor) editor.value = this.db.msg;
const ready = this.db.teacher && this.db.student && this.db.tutor && this.db.phone.length > 6 && this.db.opt;
document.getElementById('send-btn').disabled = !ready;
const v = document.getElementById('v-stat');
v.className = ready ? "validator v-on" : "validator v-off";
v.innerText = ready ? "✓ LISTO PARA WHATSAPP" : "ESPERANDO DATOS...";
document.querySelectorAll('.opt-item').forEach(i => i.classList.toggle('active', i.dataset.id === this.db.opt));
},
bind() {
const map = {'t-in':'teacher','s-in':'student','p-in':'tutor','c-in':'phone','editor':'msg'};
for(let id in map) document.getElementById(id).oninput = (e) => this.update(map[id], e.target.value);
document.getElementById('send-btn').onclick = () => {
const text = encodeURIComponent(this.db.msg);
// Híbrido: wa.me para móviles (fuerza apertura de app), web.whatsapp para PC (ventana única)
const base = this.db.isMobile ? "https://wa.me/" : "https://web.whatsapp.com/send?phone=";
const url = this.db.isMobile ? `${base}${this.db.phone}?text=${text}` : `${base}${this.db.phone}&text=${text}`;
window.open(url, this.db.isMobile ? "_self" : "WA_GATEWAY");
};
document.getElementById('copy-btn').onclick = () => {
navigator.clipboard.writeText(this.db.msg);
alert("Mensaje copiado");
};
}
};
setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('es-ES',{hour12:false}); }, 1000);
document.addEventListener('DOMContentLoaded', () => State.init());
</script>
</body>
</html>
